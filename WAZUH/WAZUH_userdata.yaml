#cloud-config

hostname: wazuh
manage_etc_hosts: true

users:
  - name: wazuh
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    passwd: $6$qTDYvGhBFYXcEuz.$k1DP25NmlgMNIQLbDGCQh8k3zNDLyrdVJ/99ojc3ir5xNjGxvB736GWNHA0LszFPYdIpD4W6Jxhz45ql6LpmM0
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK9gExgup4UNA3vRiCBKdCK9+IdVKbosvXEDpTrjqGVW shared-admin-key

ssh_pwauth: true
chpasswd:
  expire: false

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - gnupg

write_files:
  - path: /root/install-wazuh.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e

      exec > >(tee -a /root/wazuh-install.log) 2>&1

      echo "=== Installing Wazuh ==="

      # wait for apt/cloud-init to finish
      sleep 60

      while fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
            fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
            fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
        echo "Waiting for apt locks..."
        sleep 5
      done

      cd /root
      rm -f wazuh-install.sh
      curl -sO https://packages.wazuh.com/4.13/wazuh-install.sh
      chmod +x wazuh-install.sh

      bash /root/wazuh-install.sh -a -p 'Password1!' --ignore-check

      echo "=== Waiting for API ==="
      sleep 120

      cat >/tmp/wazuh-user.json <<'EOF'
      {
        "username": "wazuh",
        "password": "Password1!",
        "roles": ["administrator"]
      }
      EOF

      echo "=== Creating wazuh user ==="
      curl -k -u admin:Password1! \
        -X POST "https://localhost:55000/security/users" \
        -H "Content-Type: application/json" \
        -d @/tmp/wazuh-user.json || true

      echo "=== Done ==="

runcmd:
  - bash /root/install-wazuh.sh
power_state:
  mode: poweroff
  message: "Cloud-init finished - powering off"
  timeout: 30
  condition: True
