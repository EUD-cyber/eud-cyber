#cloud-config

hostname: wazuh
manage_etc_hosts: true

users:
  - name: wazuh
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    passwd: $6$qTDYvGhBFYXcEuz.$k1DP25NmlgMNIQLbDGCQh8k3zNDLyrdVJ/99ojc3ir5xNjGxvB736GWNHA0LszFPYdIpD4W6Jxhz45ql6LpmM0
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK9gExgup4UNA3vRiCBKdCK9+IdVKbosvXEDpTrjqGVW shared-admin-key

ssh_pwauth: true
chpasswd:
  expire: false

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - gnupg

write_files:
  - path: /root/install-wazuh.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      exec > >(tee -a /root/wazuh-install.log) 2>&1

      WAZUH_PASS='Password1?'
      TOKEN_FILE='/root/wazuh-api.token'

      echo "=== Installing Wazuh ==="

      sleep 60

      while fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
            fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
            fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
        echo "Waiting for apt locks..."
        sleep 5
      done

      cd /root
      rm -f /root/wazuh-install.sh
      curl -sO https://packages.wazuh.com/4.13/wazuh-install.sh
      chmod +x /root/wazuh-install.sh

      bash /root/wazuh-install.sh -a --ignore-check

      echo "=== Setting dashboard/indexer admin password ==="
      bash /usr/share/wazuh-indexer/plugins/opensearch-security/tools/wazuh-passwords-tool.sh \
        -u admin -p "${WAZUH_PASS}"

      echo "=== Reading current wazuh-wui password from dashboard config ==="
      WUI_PASS="$(awk -F': ' '/^\s*password:/ {print $2; exit}' /usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml)"

      if [ -z "${WUI_PASS}" ]; then
        echo "ERROR: Could not read wazuh-wui password from dashboard config"
        exit 1
      fi

      echo "=== Setting Wazuh API admin password ==="
      bash /usr/share/wazuh-indexer/plugins/opensearch-security/tools/wazuh-passwords-tool.sh \
        --api -u wazuh -p "${WAZUH_PASS}" \
        --admin-user wazuh-wui --admin-password "${WUI_PASS}"

      echo "=== Restarting services ==="
      systemctl restart wazuh-indexer wazuh-manager wazuh-dashboard

      echo "=== Waiting for API ==="
      for i in $(seq 1 60); do
        if curl -sk https://localhost:55000/ >/dev/null 2>&1; then
          break
        fi
        sleep 5
      done

      echo "=== Requesting API token ==="
      TOKEN="$(curl -sSk -u "wazuh:${WAZUH_PASS}" \
        -X POST "https://localhost:55000/security/user/authenticate?raw=true")"

      if [ -z "${TOKEN}" ]; then
        echo "ERROR: API token is empty"
        exit 1
      fi

      echo "${TOKEN}" > "${TOKEN_FILE}"
      chmod 600 "${TOKEN_FILE}"

      echo "=== Testing API token ==="
      curl -sSk \
        -H "Authorization: Bearer ${TOKEN}" \
        "https://localhost:55000/manager/status" >/root/wazuh-manager-status.json

      echo "=== Done ==="
      echo "Dashboard user: admin"
      echo "Dashboard password: ${WAZUH_PASS}"
      echo "API user: wazuh"
      echo "API password: ${WAZUH_PASS}"
      echo "API token saved to: ${TOKEN_FILE}"

runcmd:
  - bash /root/install-wazuh.sh

power_state:
  mode: poweroff
  message: "Cloud-init finished - powering off"
  timeout: 30
  condition: True
