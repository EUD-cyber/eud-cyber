#cloud-config

hostname: wazuh
manage_etc_hosts: true

users:
  - name: wazuh
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    passwd: $6$qTDYvGhBFYXcEuz.$k1DP25NmlgMNIQLbDGCQh8k3zNDLyrdVJ/99ojc3ir5xNjGxvB736GWNHA0LszFPYdIpD4W6Jxhz45ql6LpmM0
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK9gExgup4UNA3vRiCBKdCK9+IdVKbosvXEDpTrjqGVW shared-admin-key

ssh_pwauth: true
chpasswd:
  expire: false

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - gnupg
  - tar

write_files:
  - path: /root/install-wazuh.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      exec > >(tee -a /root/wazuh-install.log) 2>&1

      PASS='Password1?'
      TOKEN_FILE='/root/wazuh-api.token'

      echo "=== Waiting for apt/cloud-init ==="
      sleep 60
      while fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
            fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
            fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
        echo "Waiting for apt locks..."
        sleep 5
      done

      echo "=== Installing Wazuh ==="
      cd /root
      rm -f /root/wazuh-install.sh
      curl -sO https://packages.wazuh.com/4.13/wazuh-install.sh
      chmod +x /root/wazuh-install.sh
      bash /root/wazuh-install.sh -a --ignore-check

      # insert log all 
      sed -i 's|<logall>.*</logall>|<logall>yes</logall>|' /var/ossec/etc/ossec.conf
      sed -i 's|<logall_json>.*</logall_json>|<logall_json>yes</logall_json>|' /var/ossec/etc/ossec.conf
      systemctl restart wazuh-manager

      # And dashboard-indeks:
      sed -i 's/archives:\n      enabled: false/archives:\n      enabled: true/' /etc/filebeat/filebeat.yml
      systemctl restart filebeat

      echo "=== Setting indexer/dashboard admin password ==="
      /usr/share/wazuh-indexer/plugins/opensearch-security/tools/wazuh-passwords-tool.sh \
        -u admin -p "${PASS}"

      echo "=== Reading current API credentials generated by installer ==="
      API_ADMIN_USER="wazuh"
      API_ADMIN_PASS="$(tar -axf /root/wazuh-install-files.tar wazuh-install-files/wazuh-passwords.txt -O | awk "/API user wazuh/{getline; print}" | sed 's/^.*: //')"

      if [ -z "${API_ADMIN_PASS}" ]; then
        echo "ERROR: Could not extract current wazuh API password from wazuh-install-files.tar"
        exit 1
      fi

      echo "=== Setting Wazuh API password for user wazuh ==="
      /usr/share/wazuh-indexer/plugins/opensearch-security/tools/wazuh-passwords-tool.sh \
        --api -u wazuh -p "${PASS}" \
        --admin-user "${API_ADMIN_USER}" --admin-password "${API_ADMIN_PASS}"

      echo "=== Updating dashboard connector user password (wazuh-wui) ==="
      /usr/share/wazuh-indexer/plugins/opensearch-security/tools/wazuh-passwords-tool.sh \
        --api -u wazuh-wui -p "${PASS}" \
        --admin-user wazuh --admin-password "${PASS}"

      echo "=== Restarting services ==="
      systemctl restart wazuh-indexer wazuh-manager wazuh-dashboard

      echo "=== Waiting for API ==="
      for i in $(seq 1 60); do
        if curl -sk https://localhost:55000/ >/dev/null 2>&1; then
          break
        fi
        sleep 5
      done

      echo "=== Requesting JWT token ==="
      TOKEN="$(curl -sSk -u "wazuh:${PASS}" -X POST "https://localhost:55000/security/user/authenticate?raw=true")"

      if [ -z "${TOKEN}" ]; then
        echo "ERROR: API token is empty"
        exit 1
      fi

      echo "${TOKEN}" > "${TOKEN_FILE}"
      chmod 600 "${TOKEN_FILE}"

      echo "=== Testing token ==="
      curl -sSk -H "Authorization: Bearer ${TOKEN}" \
        "https://localhost:55000/manager/status" > /root/wazuh-manager-status.json

      echo "=== Done ==="
      echo "Dashboard/indexer user: admin"
      echo "Dashboard/indexer password: ${PASS}"
      echo "API user: wazuh"
      echo "API password: ${PASS}"
      echo "Dashboard connector user: wazuh-wui"
      echo "Dashboard connector password: ${PASS}"
      echo "Token saved to: ${TOKEN_FILE}"

runcmd:
  - bash /root/install-wazuh.sh

power_state:
  mode: poweroff
  message: "Cloud-init finished - powering off"
  timeout: 30
  condition: True
