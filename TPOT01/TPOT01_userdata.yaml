#cloud-config

hostname: tpot01
manage_etc_hosts: true

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    passwd: $6$qTDYvGhBFYXcEuz.$k1DP25NmlgMNIQLbDGCQh8k3zNDLyrdVJ/99ojc3ir5xNjGxvB736GWNHA0LszFPYdIpD4W6Jxhz45ql6LpmM0
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK9gExgup4UNA3vRiCBKdCK9+IdVKbosvXEDpTrjqGVW shared-admin-key

ssh_pwauth: true
chpasswd:
  expire: false
  
packages:
  - git
  - curl
  - wget

write_files:

  - path: /usr/local/bin/install-tpot.sh
    permissions: "0755"
    content: |
      #!/bin/bash

      LOGFILE="/var/log/tpot-install.log"
      exec > >(tee -a $LOGFILE) 2>&1

      echo "==============================="
      echo "T-Pot Installation Started"
      date
      echo "==============================="

      set -e

      # =========================
      # Wait for network
      # =========================
      echo "[*] Waiting for network..."
      sleep 15

      # =========================
      # Update system
      # =========================
      echo "[*] Updating system..."
      apt-get update
      apt-get install -y docker.io docker-compose

      systemctl enable docker
      systemctl start docker

      # =========================
      # Clone T-Pot
      # =========================
      echo "[*] Cloning T-Pot..."
      cd /opt

      if [ ! -d "tpotce" ]; then
        git clone https://github.com/telekom-security/tpotce
      fi

      cd /opt/tpotce
      chmod +x install.sh

      echo "[*] Starting T-Pot installer..."

      # =========================
      # RUN INSTALL (INTERACTIVE WARNING)
      # =========================
      ./install.sh <<EOF
      y
      y
      EOF

      echo "==============================="
      echo "T-Pot Installation Completed"
      date
      echo "==============================="

      # =========================
      # Verify install
      # =========================
      echo "[*] Checking Docker containers..."
      docker ps -a || true

      echo "[*] Checking T-Pot service..."
      systemctl status tpot || true

      echo "[*] Writing success marker..."
      touch /var/log/tpot-installed.success

      echo "[*] System will shutdown in 15 seconds..."
      sleep 15

      shutdown -h now

runcmd:
  - /usr/local/bin/install-tpot.sh
