#cloud-config

hostname: tpot01
manage_etc_hosts: true

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    passwd: $6$qTDYvGhBFYXcEuz.$k1DP25NmlgMNIQLbDGCQh8k3zNDLyrdVJ/99ojc3ir5xNjGxvB736GWNHA0LszFPYdIpD4W6Jxhz45ql6LpmM0
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK9gExgup4UNA3vRiCBKdCK9+IdVKbosvXEDpTrjqGVW shared-admin-key

ssh_pwauth: true
chpasswd:
  expire: false
  
packages:
  - git
  - curl
  - wget

write_files:
  - path: /usr/local/bin/install-tpot.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      LOGFILE="/var/log/tpot-install.log"
      SUCCESSFILE="/var/log/tpot-installed.success"
      FAILFILE="/var/log/tpot-installed.failed"
      TPOT_USER="ubuntu"
      TPOT_HOME="/home/${TPOT_USER}"
      TPOT_DIR="${TPOT_HOME}/tpotce"

      exec > >(tee -a "$LOGFILE") 2>&1

      echo "=================================="
      echo "T-Pot cloud-init installer started"
      date
      echo "=================================="

      trap 'RC=$?; echo "[!] Install failed with exit code $RC"; date; touch "$FAILFILE"; exit $RC' ERR

      echo "[*] Waiting for network..."
      sleep 20

      echo "[*] Ensuring home ownership..."
      chown -R "${TPOT_USER}:${TPOT_USER}" "$TPOT_HOME"

      echo "[*] Cloning T-Pot as ${TPOT_USER}..."
      sudo -u "${TPOT_USER}" -H bash -lc "
        set -e
        cd ~
        if [ ! -d tpotce ]; then
          git clone https://github.com/telekom-security/tpotce
        fi
        cd tpotce
        chmod +x install.sh
      "

      echo "[*] Starting T-Pot installer as user: ${TPOT_USER}"
      echo "[*] Log file: ${LOGFILE}"

      sudo -u "${TPOT_USER}" -H bash -lc "
        set -e
        cd '${TPOT_DIR}'
        ./install.sh
      "

      echo "[*] Installer finished."
      touch "$SUCCESSFILE"

      echo "[*] Quick status info..."
      id "${TPOT_USER}" || true
      systemctl status tpot --no-pager || true
      docker ps -a || true
      ss -tulpn || true

      echo "=================================="
      echo "T-Pot install completed"
      date
      echo "=================================="

      echo "[*] Shutting down in 20 seconds..."
      sleep 20
      shutdown -h now

runcmd:
  - /usr/local/bin/install-tpot.sh
