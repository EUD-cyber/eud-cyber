#cloud-config

hostname: tpot01
manage_etc_hosts: true

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    passwd: $6$qTDYvGhBFYXcEuz.$k1DP25NmlgMNIQLbDGCQh8k3zNDLyrdVJ/99ojc3ir5xNjGxvB736GWNHA0LszFPYdIpD4W6Jxhz45ql6LpmM0
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK9gExgup4UNA3vRiCBKdCK9+IdVKbosvXEDpTrjqGVW shared-admin-key

ssh_pwauth: true
chpasswd:
  expire: false
  
packages:
  - git
  - curl
  - wget
  - expect
  - apache2-utils

write_files:
  - path: /usr/local/bin/install-tpot.sh
    permissions: "0755"
    content: |
        #!/bin/bash
        set -euo pipefail
        
        LOGFILE="/var/log/tpot-install.log"
        SESSIONLOG="/var/log/tpot-session.log"
        SUCCESSFILE="/var/log/tpot-installed.success"
        FAILFILE="/var/log/tpot-installed.failed"
        TPOT_USER="ubuntu"
        TPOT_HOME="/home/${TPOT_USER}"
        TPOT_DIR="${TPOT_HOME}/tpotce"
        
        WEB_USERNAME="adminlab"
        WEB_PASSWORD="ChangeThisNow123!"
        
        exec > >(tee -a "$LOGFILE") 2>&1
        
        trap 'RC=$?; echo "[!] Install failed with exit code $RC"; date; touch "$FAILFILE"; exit $RC' ERR
        
        echo "[*] Waiting for network..."
        sleep 20
        
        echo "[*] Installing required packages..."
        apt-get update
        apt-get install -y git curl wget expect apache2-utils
        
        echo "[*] Cloning T-Pot as ${TPOT_USER}..."
        sudo -u "${TPOT_USER}" -H bash -lc '
          set -e
          cd ~
          if [ ! -d tpotce ]; then
            git clone https://github.com/telekom-security/tpotce
          fi
          cd tpotce
          chmod +x install.sh
        '
        
        echo "[*] Preseeding WEB_USER in .env ..."
        WEB_USER_B64="$(htpasswd -n -b "$WEB_USERNAME" "$WEB_PASSWORD" | base64 -w0)"
        
        sudo -u "${TPOT_USER}" -H bash -lc "
          set -e
          cd '${TPOT_DIR}'
          sed -i 's|^WEB_USER=.*|WEB_USER=${WEB_USER_B64}|' .env
        "
        
        cat > /tmp/tpot-install.expect <<'EOF'
        #!/usr/bin/expect -f
        set timeout -1
        log_user 1
        log_file -a /var/log/tpot-session.log
        
        spawn sudo -u ubuntu -H bash -lc "cd ~/tpotce && ./install.sh"
        
        expect {
          -re {.*Do you want to continue.*} { send "y\r"; exp_continue }
          -re {.*\\\[hive\\/sensor\\\].*} { send "hive\r"; exp_continue }
          -re {.*install type.*} { send "hive\r"; exp_continue }
          eof
        }
        EOF
        
        chmod +x /tmp/tpot-install.expect
        
        echo "[*] Running T-Pot installer with expect..."
        /tmp/tpot-install.expect
        
        echo "[*] Marking success..."
        touch "$SUCCESSFILE"
        
        echo "[*] Shutting down in 20 seconds..."
        sleep 20
        shutdown -h now

runcmd:
  - /usr/local/bin/install-tpot.sh
