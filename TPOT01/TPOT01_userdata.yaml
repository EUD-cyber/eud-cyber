#cloud-config

hostname: tpot01
manage_etc_hosts: true

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    passwd: $6$qTDYvGhBFYXcEuz.$k1DP25NmlgMNIQLbDGCQh8k3zNDLyrdVJ/99ojc3ir5xNjGxvB736GWNHA0LszFPYdIpD4W6Jxhz45ql6LpmM0
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK9gExgup4UNA3vRiCBKdCK9+IdVKbosvXEDpTrjqGVW shared-admin-key

ssh_pwauth: true
chpasswd:
  expire: false
  
packages:
  - git
  - curl
  - wget
  - ca-certificates

write_files:
  - path: /usr/local/bin/tpot-install.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -euxo pipefail

      # =========================
      # VARIABLES (EDIT THESE)
      # =========================
      TPOT_TYPE="h"              # h = hive
      TPOT_USER="admin"
      TPOT_PASS="Password1!"

      LOG="/var/log/tpot-install.log"
      STATUS="/var/log/tpot-install-status.log"

      exec > >(tee -a "$LOG") 2>&1

      echo "===== TPOT INSTALL START $(date -Iseconds) ====="
      echo "starting" > "$STATUS"

      export DEBIAN_FRONTEND=noninteractive

      apt-get update
      apt-get install -y git curl wget ca-certificates

      cd /opt

      # Clean previous install if exists
      if [ -d /opt/tpotce ]; then
        rm -rf /opt/tpotce
      fi

      git clone https://github.com/telekom-security/tpotce /opt/tpotce

      chown -R ubuntu:ubuntu /opt/tpotce

      echo "Running installer as ubuntu" | tee -a "$STATUS"

      sudo -u ubuntu bash -lc "
        set -euxo pipefail
        cd /opt/tpotce/

        ./install.sh -t ${TPOT_TYPE} -u ${TPOT_USER} -p ${TPOT_PASS}
      "

      RC=$?
      echo "installer exit code: $RC" | tee -a "$STATUS"

      if [ "$RC" -eq 0 ]; then
        echo "success" > "$STATUS"
      else
        echo "failed" > "$STATUS"
      fi

      echo "===== TPOT INSTALL END $(date -Iseconds) ====="

      sync
      shutdown -h now

runcmd:
  - [ bash, -lc, "/usr/local/bin/tpot-install.sh" ]

final_message: "T-Pot install complete. Check logs in /var/log/"
