services:
  redis:
    image: redis:7
    restart: unless-stopped

  pg-gvm:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: gvmd
      POSTGRES_USER: gvmd
      POSTGRES_PASSWORD: gvmd
    volumes:
      - pg_data:/var/lib/postgresql/data

  gvmd:
    image: greenbone/gvmd:stable
    restart: unless-stopped
    depends_on:
      - pg-gvm
      - redis
    environment:
      GVMD_POSTGRESQL_DBNAME: gvmd
      GVMD_POSTGRESQL_USERNAME: gvmd
      GVMD_POSTGRESQL_PASSWORD: gvmd
      GVMD_POSTGRESQL_HOST: pg-gvm

  gsa:
    image: greenbone/gsa:stable
    restart: unless-stopped
    depends_on:
      - gvmd
    ports:
      - "9392:80"

  ospd-openvas:
    image: greenbone/ospd-openvas:stable
    restart: unless-stopped
    depends_on:
      - redis

  openvas:
    image: greenbone/openvas-scanner:stable
    restart: unless-stopped
    depends_on:
      - ospd-openvas

volumes:
  pg_data:
